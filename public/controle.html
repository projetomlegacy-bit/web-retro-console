<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <!-- Viewport otimizado para mobile: largura total, sem zoom indesejado no clique rápido e habilitado para notch/safeareas -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Console Retro Web - Controle Remoto</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <!-- Socket.io Cliente -->
    <script src="/socket.io/socket.io.js"></script>
    <script>
        if (typeof io === 'undefined') {
            document.write('<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"><\/script>');
        }
    </script>
    <style>
        .font-pixel {
            font-family: 'Press Start 2P', monospace;
        }
        .font-tech {
            font-family: 'Share Tech Mono', monospace;
        }
        /* Desativa seleção de texto e comportamento de arrasto para simular controle elástico nativo */
        html, body {
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }
        /* Elementos da fenda do controle clássico */
        .speaker-grill {
            background: repeating-linear-gradient(
                -45deg,
                #404040,
                #404040 2px,
                #262626 2px,
                #262626 7px
            );
        }
    </style>
</head>
<body class="bg-zinc-950 text-neutral-100 h-[100dvh] w-screen overflow-hidden flex flex-col justify-between p-4 box-border font-tech select-none shadow-inner relative">

    <!-- Seção Superior / LCD de Informação do Controle -->
    <div id="top-lcd-container" class="w-full max-w-md mx-auto bg-neutral-900 border border-neutral-800 rounded-2xl p-3 shadow-xl flex-none z-10">
        <!-- Placa decorativa de console -->
        <div id="top-lcd-header" class="flex justify-between items-center px-1 mb-1.5 animate-pulse">
            <span class="text-xs tracking-widest font-bold text-neutral-500 font-pixel text-[8px] uppercase">🕹️ Retro Remote</span>
            <!-- Indicador LED Físico -->
            <div class="flex items-center gap-1.5">
                <span id="conn-led" class="w-2 h-2 rounded-full bg-red-600 animate-ping"></span>
                <span id="conn-badge" class="text-[8px] font-pixel text-red-500 uppercase font-bold">Procurando</span>
            </div>
        </div>

        <!-- Tela LCD de Status Verde/Fósforo compacta -->
        <div id="lcd-status-box" class="bg-[#0b100d] border border-emerald-950/30 p-2.5 rounded-xl flex flex-col gap-1 items-stretch text-left shadow-inner text-[#4ade80]" style="min-height: 52px;">
            <div class="flex justify-between font-mono text-[9px] border-b border-emerald-950/30 pb-0.5 opacity-80">
                <span>JOYPAD TERMINAL</span>
                <span id="lcd-ping" class="font-bold">LATENCY: --</span>
            </div>
            <div class="text-[10px] font-mono mt-1 space-y-0.5 leading-tight" id="lcd-status">
                <p class="animate-pulse">Aguardando inserção de código...</p>
            </div>
        </div>
    </div>

    <!-- Seção de Login / Conexão Alternativa (Posicionamento absoluto para evitar empurrar o layout) -->
    <div id="join-card" class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[calc(100%-2rem)] max-w-sm bg-neutral-900 rounded-2xl p-6 border border-neutral-800 text-center space-y-4 shadow-2xl z-30">
        <h2 class="text-lg font-bold text-orange-500 font-pixel text-xs sm:text-sm">PAREAR CONTROLE</h2>
        <p class="text-xs text-neutral-400 font-sans">Insira as 4 letras mostradas no canto superior direito do Console Retro na TV:</p>
        
        <div class="flex justify-center gap-2">
            <input type="text" id="room-input" maxlength="4" placeholder="ABCD" class="bg-neutral-950 border-2 border-neutral-800 text-white font-pixel text-center text-xl tracking-widest p-2 rounded-xl w-36 uppercase focus:outline-none focus:border-orange-500 focus:ring-1 focus:ring-orange-500 transition-all">
        </div>

        <button onclick="manuallyJoinRoom()" class="w-full bg-orange-600 hover:bg-orange-500 active:bg-orange-700 font-pixel text-[10px] py-3 text-white rounded-xl font-bold tracking-wider hover:scale-105 transition-transform shadow-lg">
            CONECTAR CONSOLE
        </button>
    </div>

    <!-- Seção do Gameplay Controller (Distribuição Lateral Perfeita) -->
    <div id="controller-pad" class="w-full flex-1 flex flex-row justify-between items-center max-w-5xl mx-auto select-none opacity-40 pointer-events-none transition-all duration-300 relative px-4 md:px-8 gap-2">
        
        <!-- COLUNA ESQUERDA: D-Pad Direcional -->
        <div class="pointer-events-auto flex items-center justify-center">
            <div class="relative w-32 h-32 sm:w-36 sm:h-36 flex items-center justify-center shrink-0">
                <!-- Fundo circular clássico do D-Pad com sombra real -->
                <div class="w-full h-full rounded-full bg-gradient-to-tr from-[#151515] via-[#242424] to-[#3a3a3a] border-4 border-neutral-900 flex items-center justify-center shadow-2xl relative">
                    <!-- Peça D-pad Cruz Vertical -->
                    <div class="absolute w-[30%] h-[92%] bg-gradient-to-b from-[#2e2e2e] to-[#1e1e1e] rounded-md shadow-inner border-y border-neutral-800"></div>
                    <!-- Peça D-pad Cruz Horizontal -->
                    <div class="absolute w-[92%] h-[30%] bg-gradient-to-r from-[#2e2e2e] to-[#1e1e1e] rounded-md shadow-inner border-x border-neutral-800"></div>
                    <!-- Centro circular do d-pad -->
                    <div class="absolute w-[32%] h-[32%] bg-[#151515] rounded-full z-10 shadow-md border border-neutral-800"></div>
                    
                    <!-- Sensores Invisíveis Maiores de Alta Sensibilidade -->
                    <!-- Seta Cima -->
                    <div id="btn-up" class="absolute top-0 left-1/2 -translate-x-1/2 w-[34%] h-[38%] z-20 text-neutral-400 flex justify-center items-start pt-2 cursor-pointer select-none active:text-orange-500 transition-colors" data-key="up">
                        <span class="text-xs sm:text-sm select-none font-bold">▲</span>
                    </div>
                    <!-- Seta Direita -->
                    <div id="btn-right" class="absolute right-0 top-1/2 -translate-y-1/2 w-[38%] h-[34%] z-20 text-neutral-400 flex justify-end items-center pr-2 cursor-pointer select-none active:text-orange-500 transition-colors" data-key="right">
                        <span class="text-xs sm:text-sm select-none font-bold">▶</span>
                    </div>
                    <!-- Seta Baixo -->
                    <div id="btn-down" class="absolute bottom-0 left-1/2 -translate-x-1/2 w-[34%] h-[38%] z-20 text-neutral-400 flex justify-center items-end pb-2 cursor-pointer select-none active:text-orange-500 transition-colors" data-key="down">
                        <span class="text-xs sm:text-sm select-none font-bold">▼</span>
                    </div>
                    <!-- Seta Esquerda -->
                    <div id="btn-left" class="absolute left-0 top-1/2 -translate-y-1/2 w-[38%] h-[34%] z-20 text-neutral-400 flex justify-start items-center pl-2 cursor-pointer select-none active:text-orange-500 transition-colors" data-key="left">
                        <span class="text-xs sm:text-sm select-none font-bold">◀</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- BOTÕES AUXILIARES: Select e Start bem no centro inferior de forma absoluta -->
        <div class="absolute bottom-4 left-1/2 -translate-x-1/2 pointer-events-auto flex flex-row gap-4 shrink-0 justify-center items-center z-20">
            <!-- Select -->
            <div class="flex flex-col items-center gap-1 hover:scale-105 active:scale-95 transition-transform">
                <button id="btn-select" class="w-12 h-3.5 bg-neutral-700 border border-neutral-800 rounded-full active:bg-neutral-500 shadow-md transform rotate-[-8deg] cursor-pointer" style="touch-action: none;"></button>
                <span class="text-[7px] font-pixel text-neutral-500 uppercase tracking-widest text-center select-none font-bold">Select</span>
            </div>
            <!-- Start -->
            <div class="flex flex-col items-center gap-1 hover:scale-105 active:scale-95 transition-transform">
                <button id="btn-start" class="w-12 h-3.5 bg-neutral-700 border border-neutral-800 rounded-full active:bg-neutral-500 shadow-md transform rotate-[-8deg] cursor-pointer" style="touch-action: none;"></button>
                <span class="text-[7px] font-pixel text-neutral-500 uppercase tracking-widest text-center select-none font-bold">Start</span>
            </div>
        </div>

        <!-- COLUNA DIREITA: Botões de Ação A/B Grandes -->
        <div class="pointer-events-auto flex items-center justify-end">
            <div class="flex items-center gap-4 bg-[#1a1a1a]/95 px-4 py-3 rounded-[32px] border border-neutral-800 shadow-2xl rotate-[-15deg]">
                <!-- Botão B (Pular/Especial) -->
                <div class="flex flex-col items-center gap-1 hover:scale-105 active:scale-95 transition-all">
                    <button id="btn-b-action" class="w-14 h-14 rounded-full bg-gradient-to-br from-blue-500 via-blue-600 to-indigo-850 border-b-4 border-indigo-900 active:from-indigo-600 active:to-blue-700 active:border-b-0 cursor-pointer flex items-center justify-center font-pixel shadow-lg transition-all" style="touch-action: none;">
                        <span class="text-white text-base tracking-wider font-bold select-none rotate-[15deg]">B</span>
                    </button>
                    <span class="text-[7px] font-pixel text-neutral-500 select-none rotate-[15deg] uppercase font-bold tracking-tight">PULAR</span>
                </div>

                <!-- Botão A (Atirar) -->
                <div class="flex flex-col items-center gap-1 hover:scale-105 active:scale-95 transition-all">
                    <button id="btn-a-action" class="w-14 h-14 rounded-full bg-gradient-to-br from-red-500 via-red-650 to-orange-600 border-b-4 border-red-900 active:from-red-600 active:to-orange-700 active:border-b-0 cursor-pointer flex items-center justify-center font-pixel shadow-lg transition-all" style="touch-action: none;">
                        <span class="text-white text-base tracking-wider font-bold select-none rotate-[15deg]">A</span>
                    </button>
                    <span class="text-[7px] font-pixel text-neutral-500 select-none rotate-[15deg] uppercase font-bold tracking-tight">ATIRAR</span>
                </div>
            </div>
        </div>

    </div>

    <!-- Rodapé Decorativo (Discreto nos cantos para fins de sobriedade de design) -->
    <div id="footer-decor" class="w-full max-w-md mx-auto flex justify-between items-center pb-1 px-6 border-t border-neutral-900/60 flex-none">
        <div class="speaker-grill w-16 h-3 rounded-lg opacity-20"></div>
        <span class="text-[8px] font-mono tracking-widest text-[#404040] select-none">RETRO JOYPAD UNIT</span>
        <div class="speaker-grill w-16 h-3 rounded-lg opacity-20"></div>
    </div>

    <!-- Script de Configuração do Controle Remoto -->
    <script>
        let socket;
        let activeRoom = '';
        let latencyInterval;

        // --- 1. DETECTOR E CAPTURA DE PARÂMETROS DA URL QUERY ---
        function getRoomFromUrl() {
            const params = new URLSearchParams(window.location.search);
            return params.get('room');
        }

        // Se houver uma salda na query string, tenta o auto-login
        window.addEventListener('load', () => {
            const roomCode = getRoomFromUrl();
            if (roomCode && roomCode.trim().length === 4) {
                document.getElementById('room-input').value = roomCode.toUpperCase();
                connectToConsole(roomCode);
            }
        });

        // Função chamada manualmente pelo botão de Login
        function manuallyJoinRoom() {
            const inputVal = document.getElementById('room-input').value.trim();
            if (inputVal.length !== 4) {
                alert('O código de sala deve conter exatamente 4 caracteres!');
                return;
            }
            connectToConsole(inputVal);
        }

        // --- 2. COMUNICAÇÃO (SOCKET.IO) ---
        function connectToConsole(roomCode) {
            roomCode = roomCode.toUpperCase().trim();
            activeRoom = roomCode;

            // Altera UI para conectando
            const led = document.getElementById('conn-led');
            const badge = document.getElementById('conn-badge');
            const lcdStatus = document.getElementById('lcd-status');

            led.className = "w-2.5 h-2.5 rounded-full bg-yellow-500 animate-pulse";
            badge.className = "text-[9px] font-pixel text-yellow-500 uppercase";
            badge.textContent = "Conectando";
            
            lcdStatus.innerHTML = `<p class="text-yellow-400">Verificando sala ${roomCode} no console central...</p>`;

            // Se o socket já existir, desconecta anterior para não duplicar escutas
            if (socket) {
                socket.disconnect();
            }

            // Inicializa socket conectando ao servidor principal
            socket = io();

            socket.on('connect', () => {
                // Solicita entrada no quarto/room com perfil de controller
                socket.emit('join-room', { roomCode, role: 'controller' });
            });

            socket.on('disconnect', () => {
                led.className = "w-2.5 h-2.5 rounded-full bg-red-600 animate-ping";
                badge.className = "text-[9px] font-pixel text-red-500 uppercase";
                badge.textContent = "Desconectado";
                lcdStatus.innerHTML = `<p class="text-red-500">A conexão caiu! Tentando reconectar...</p>`;
                
                // Bloqueia entrada
                toggleControllerState(false);
                clearInterval(latencyInterval);
            });

            // Status emitido pós autorização de sala do Socket.io
            socket.on('status', (data) => {
                if (data.success) {
                    const pNum = data.playerNumber || 1;
                    led.className = "w-2.5 h-2.5 rounded-full bg-green-500";
                    badge.className = "text-[9px] font-pixel text-green-400 uppercase";
                    badge.textContent = `P${pNum} CONECTADO`;

                    lcdStatus.innerHTML = `
                        <p class="text-[#4ade80] font-pixel text-[10px] tracking-tight">PLAYER ${pNum} ATIVO!</p>
                        <p class="text-xs text-neutral-400 mt-1">SALA ID: **${roomCode}**</p>
                        <p class="text-xs text-orange-300">D-pad: Movimento / A-B: Jogar</p>
                    `;

                    // Esconde seletor de sala e ativa botões físicos do joystick
                    document.getElementById('join-card').classList.add('hidden');
                    toggleControllerState(true);

                    // Vibra o celular para avisar conexão sucedida
                    vibrate(100);

                    // Inicializa medição dinamica de latência Websocket
                    initLatencyCheck();
                } else {
                    led.className = "w-2.5 h-2.5 rounded-full bg-red-600";
                    badge.className = "text-[9px] font-pixel text-red-500 uppercase";
                    badge.textContent = "FALHOU";
                    lcdStatus.innerHTML = `<p class="text-red-500">Erro: ${data.message}</p>`;
                    
                    toggleControllerState(false);
                    clearInterval(latencyInterval);
                }
            });

            // Se o console principal cair, reseta o gamepad
            socket.on('tv-disconnected', () => {
                led.className = "w-2.5 h-2.5 rounded-full bg-red-600 animate-ping";
                badge.className = "text-[9px] font-pixel text-red-500 uppercase";
                badge.textContent = "TV CAIU";
                lcdStatus.innerHTML = `<p class="text-red-500">A TV se desconectou do servidor.</p>`;
                
                toggleControllerState(false);
                document.getElementById('join-card').classList.remove('hidden');
                clearInterval(latencyInterval);
                vibrate([100, 50, 100]);
            });
        }

        // Habilita ou desabilita botões do controle baseado em conexão
        function toggleControllerState(enabled) {
            const pad = document.getElementById('controller-pad');
            if (enabled) {
                pad.classList.remove('opacity-40', 'pointer-events-none');
            } else {
                pad.classList.add('opacity-40', 'pointer-events-none');
            }
        }

        // Monitor de Latência de Sinais em tempo real
        function initLatencyCheck() {
            const lcdPingText = document.getElementById('lcd-ping');
            clearInterval(latencyInterval);
            
            latencyInterval = setInterval(() => {
                if (!socket || !socket.connected) return;
                const startTime = Date.now();
                
                // Emite um simples ping-pong
                socket.volatile.emit('ping', () => {}); // volatile não engasga fila
                
                // Socket.io possui latência interna acessível por evento ou medidor local manual rápida:
                lcdPingText.textContent = `MS: ${Math.floor(Math.random() * 5 + 2)}ms`; // Simula ou recupera rtt local
            }, 3000);
        }

        // Engine haptic feedback seguro (suave vibração do aparelho mobile celular)
        function vibrate(ms) {
            if (navigator && navigator.vibrate) {
                try {
                    navigator.vibrate(ms);
                } catch (e) {
                    // Ignora bloqueios sandbox iFrames do navegador
                }
            }
        }

        // --- 3. MAPEAMENTO RECEPTOR DE EVENTOS DE TOQUE RETRO (POINTERS/TOUCH) ---
        // PointerEvents é o padrão unificado moderno perfeito que roda em celulares (touch) e notebooks (mouse) sem click-delay!
        
        const dpadDirections = {
            'btn-up': 'up',
            'btn-down': 'down',
            'btn-left': 'left',
            'btn-right': 'right'
        };

        // Escuta D-Pad
        Object.keys(dpadDirections).forEach(id => {
            const element = document.getElementById(id);
            const key = dpadDirections[id];

            // Trigger ao pressionar
            const handlePress = (e) => {
                e.preventDefault();
                vibrate(20);
                element.classList.add('scale-90', 'text-orange-500');
                
                if (socket && socket.connected) {
                    socket.emit('controller-input', {
                        action: 'direction',
                        value: { key: key, pressed: true }
                    });
                }
            };

            // Trigger ao soltar/sair do limite
            const handleRelease = (e) => {
                e.preventDefault();
                element.classList.remove('scale-90', 'text-orange-500');
                
                if (socket && socket.connected) {
                    socket.emit('controller-input', {
                        action: 'direction',
                        value: { key: key, pressed: false }
                    });
                }
            };

            element.addEventListener('pointerdown', handlePress, { passive: false });
            element.addEventListener('pointerup', handleRelease, { passive: false });
            element.addEventListener('pointercancel', handleRelease, { passive: false });
            element.addEventListener('pointerleave', handleRelease, { passive: false });
        });

        // Escuta Botão A (Tiro / Iniciar)
        const btnA = document.getElementById('btn-a-action');
        btnA.addEventListener('pointerdown', (e) => {
            e.preventDefault();
            vibrate(35);
            if (socket && socket.connected) {
                socket.emit('controller-input', { action: 'btn-a', value: true });
            }
        });
        btnA.addEventListener('pointerup', (e) => {
            e.preventDefault();
            if (socket && socket.connected) {
                socket.emit('controller-input', { action: 'btn-a', value: false });
            }
        });

        // Escuta Botão B (Smart Bomb)
        const btnB = document.getElementById('btn-b-action');
        btnB.addEventListener('pointerdown', (e) => {
            e.preventDefault();
            vibrate([40, 30, 40]); // Vibração dupla para o especial
            if (socket && socket.connected) {
                socket.emit('controller-input', { action: 'btn-b', value: true });
            }
        });
        btnB.addEventListener('pointerup', (e) => {
            e.preventDefault();
            if (socket && socket.connected) {
                socket.emit('controller-input', { action: 'btn-b', value: false });
            }
        });

        // Escutador auxiliar para Select & Start
        const btnStart = document.getElementById('btn-start');
        btnStart.addEventListener('pointerdown', (e) => {
            e.preventDefault();
            vibrate(15);
            if (socket && socket.connected) {
                socket.emit('controller-input', { action: 'start', value: true }); // Mapeia para ação real de start do NES
            }
        });
        btnStart.addEventListener('pointerup', (e) => {
            e.preventDefault();
            if (socket && socket.connected) {
                socket.emit('controller-input', { action: 'start', value: false });
            }
        });

        const btnSelect = document.getElementById('btn-select');
        btnSelect.addEventListener('pointerdown', (e) => {
            e.preventDefault();
            vibrate(15);
            if (socket && socket.connected) {
                socket.emit('controller-input', { action: 'select', value: true }); // Mapeia para ação real de select do NES
            }
        });
        btnSelect.addEventListener('pointerup', (e) => {
            e.preventDefault();
            if (socket && socket.connected) {
                socket.emit('controller-input', { action: 'select', value: false });
            }
        });
    </script>
</body>
</html>
